# Cooldown Redis config — durable persistence for the Pi deployment.
#
# A portable redis.conf with AOF persistence enabled, mounted alongside a
# persistent /data volume so cooldowns (and all time state) survive a Pi reboot.
# Without durable persistence, a reboot wipes the cooldown — a one-tap bypass
# against yourself.

bind 127.0.0.1
port 6379

# Durability: AOF (≤1s of loss on crash) plus RDB snapshots — both on.
appendonly yes
appendfsync everysec
save 3600 1 300 100 60 10000

# Persistent data dir — in the container this is a mounted volume.
dir /data
