# budget-proxy Redis config — for the Docker/Pi deployment (PLAN step 4).
#
# Local dev uses the system Redis (started via `systemctl` in start.sh). AOF was
# enabled on that instance directly in /etc/redis/redis.conf via CONFIG REWRITE,
# so this file is NOT used locally — it's the portable equivalent for the
# container, mounted alongside a persistent /data volume so cooldowns (and all
# budget state) survive a Pi reboot. Without durable persistence, a reboot wipes
# the cooldown — a one-tap bypass against yourself.

bind 127.0.0.1
port 6379

# Durability: AOF (≤1s of loss on crash) plus RDB snapshots — both on.
appendonly yes
appendfsync everysec
save 3600 1 300 100 60 10000

# Persistent data dir — in the container this is a mounted volume.
dir /data
